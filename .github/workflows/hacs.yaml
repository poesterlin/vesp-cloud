name: HACS Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  hacs:
    name: HACS Action
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run HACS validation
        if: github.event_name != 'push'
        uses: hacs/action@main
        with:
          category: integration

      - name: Run HACS validation
        if: github.event_name == 'push'
        uses: hacs/action@main
        env:
          REPOSITORY_REF: ${{ github.ref_name }}
        with:
          category: integration
