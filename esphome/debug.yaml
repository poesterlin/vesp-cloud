substitutions:
  device_name: status-display
  friendly_name: "Status Display Debug"

packages:
  base: !include packages/base.yaml
  hardware: !include packages/display_hardware.yaml
  # We use the debug touch logic instead of sensors+production touch
  touch_debug: !include packages/touch_debug.yaml
  fonts: !include packages/fonts.yaml

esphome:
  includes:
    - includes/state_manager.h
    - includes/touch_handler.h
    - includes/dial.h
    - includes/notification.h
    - includes/display_renderer.h

