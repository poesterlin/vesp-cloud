# ============================================
# Initial Flash Firmware (Reference)
# ============================================
# This is a reference file. The actual firmware is generated
# by initial-flash.ts in the editor package.

substitutions:
  device_name: display-starter
  friendly_name: "Display Starter"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: 800
    then:
      - logger.log: "Starting initial setup firmware"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal

wifi:
  ap:
    ssid: "${device_name} Setup"

captive_portal:

logger:

api:
  reboot_timeout: 15min

globals:
  - id: touch_start_x
    type: int
    initial_value: "0"
  - id: touch_last_x
    type: int
    initial_value: "0"

ota:
  - platform: esphome
  - platform: http_request

http_request:

update:
  - platform: http_request
    name: Firmware
    source: !secret firmware_update_url

time:
  - platform: sntp
    id: sntp_time

# Use the hardware package for display/touch configuration
packages:
  hardware: !include packages/lvgl_hardware.yaml

# Setup instructions displayed on first boot
lvgl:
  pages:
    - id: setup_page
      bg_color: 0x0B1020
      widgets:
        - label:
            text: "Wi-Fi Setup"
            align: TOP_MID
            y: 24
            text_color: 0xFFFFFF
            text_font: montserrat_48

        - label:
            text: "1. Connect to the hotspot\n2. Open the captive portal\n3. Enter your Wi-Fi details"
            align: CENTER
            text_align: CENTER
            text_color: 0xD7E3FF
            text_font: montserrat_24

        - label:
            text: "Network: ${device_name} Setup\nPassword: none (open network)"
            align: BOTTOM_MID
            y: -30
            text_align: CENTER
            text_color: 0x88A4FF
            text_font: montserrat_20
