esphome:
  name: ${device_name}
  on_boot:
    priority: 800
    then:
      - lambda: |-
          gpio_set_direction(GPIO_NUM_2, GPIO_MODE_OUTPUT);
          gpio_set_level(GPIO_NUM_2, 0);
          vTaskDelay(pdMS_TO_TICKS(20));
          gpio_set_level(GPIO_NUM_2, 1);
          vTaskDelay(pdMS_TO_TICKS(100));

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal

wifi:
  ap:
    ssid: "${device_name} Fallback"
    password: "password"

# Allow Bluetooth provisioning on current ESPHome builds.
esp32_improv:
  authorizer: none

# Enable logging
logger:

# Enable Home Assistant API
api:
  reboot_timeout: 15min

ota:
  - platform: esphome
  - platform: http_request

http_request:

update:
  - platform: http_request
    name: Firmware
    source: !secret firmware_update_url

time:
  - platform: sntp
    id: sntp_time

esp32_ble_tracker:
  scan_parameters:
    active: true

bluetooth_proxy:
  active: true
