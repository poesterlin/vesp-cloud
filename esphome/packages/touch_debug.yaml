# === TOUCH DEBUGGING LOGIC ===
# Included only by debug.yaml

interval:
  - interval: 200ms
    then:
      - lambda: |-
          // Enable the Debug Page (5th page) only in debug mode
          gState.totalPages = 5;

          // Force page to Debug Page (4)
          if (id(sntp_time).now().is_valid() && gState.currentPage != 4) {
             static bool forced_once = false;
             if (!forced_once) {
                 gState.currentPage = 4; 
                 forced_once = true;
             }
          }

          uint8_t reg = 0x00;
          uint8_t buf[16];
          
          if (id(touch_i2c)->write_readv(0x1A, &reg, 1, buf, 16) != i2c::ERROR_OK) return;
          
          // Map status codes to finger count
          uint8_t status = buf[0];
          int finger_count = (status == 0x06) ? 1 : (status == 0x10) ? 2 : 0;
          
          // Save to Global State for Rendering
          memcpy(gState.touchDebug.raw, buf, 16);
          gState.touchDebug.status = status;
          gState.touchDebug.fingerCount = finger_count;
          
          if (finger_count > 0) {
            // Winning Logic: Hybrid X from Fmt1, Y from Fmt3 (Unmasked High Byte)
            uint16_t x_hybrid = ((buf[1] & 0x0F) << 8) | buf[2];
            uint16_t y_hybrid = (buf[2] << 8) | buf[3];
            
            // Update State (using fmt2 slots for hybrid)
            gState.touchDebug.x1_fmt2 = x_hybrid;
            gState.touchDebug.y1_fmt2 = y_hybrid;
            
            ESP_LOGD("touch_debug", "Status=0x%02X Fingers=%d Hybrid: %d,%d Raw=[%02X %02X %02X %02X %02X %02X]", 
                     status, finger_count, x_hybrid, y_hybrid, buf[1], buf[2], buf[3], buf[4], buf[5], buf[6]);
          }
