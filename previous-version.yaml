display:
  - platform: ili9xxx
    model: ST7789V
    id: my_display
    dc_pin: GPIO41
    reset_pin: GPIO39
    cs_pin: GPIO42
    spi_id: spi_lcd
    invert_colors: true
    color_order: bgr
    update_interval: 100ms
    auto_clear_enabled: true
    data_rate: 20MHz
    rotation: 0
    dimensions:
      width: 240
      height: 320
    lambda: |-
      // === COLOR PALETTE ===
      Color black(0, 0, 0);
      Color white(255, 255, 255);
      Color cyan(0, 255, 255);
      Color amber(255, 180, 0);
      Color green(0, 255, 100);
      Color red(255, 60, 60);
      Color blue(80, 140, 255);
      Color magenta(255, 0, 200);
      Color dim(80, 80, 80);
      Color dimmer(40, 40, 40);
      
      int page = id(current_page);
      auto time_now = id(sntp_time).now();
      
      // === BACKGROUND ===
      it.filled_rectangle(0, 0, 240, 320, black);
      
      // === DECORATIVE FRAME ===
      it.rectangle(4, 4, 232, 312, dimmer);
      it.line(8, 8, 25, 8, dim);
      it.line(8, 8, 8, 25, dim);
      it.line(232, 8, 215, 8, dim);
      it.line(232, 8, 232, 25, dim);
      it.line(8, 312, 25, 312, dim);
      it.line(8, 312, 8, 295, dim);
      it.line(232, 312, 215, 312, dim);
      it.line(232, 312, 232, 295, dim);
      
      // === HEADER ===
      if (time_now.is_valid()) {
        it.printf(120, 18, id(font_medium), white, TextAlign::CENTER, "%02d:%02d", 
                  time_now.hour, time_now.minute);
        it.printf(200, 20, id(font_tiny), dim, TextAlign::CENTER, "%02d", time_now.second);
      }
      it.line(15, 38, 225, 38, dim);
      
      // === PAGE INDICATOR ===
      for (int i = 0; i < id(page_count); i++) {
        int dot_x = 120 - (id(page_count) * 7) + (i * 14) + 7;
        if (i == page) {
          it.filled_circle(dot_x, 306, 4, cyan);
        } else {
          it.circle(dot_x, 306, 3, dim);
        }
      }
      
      // =========================================
      // PAGE 0: STATUS OVERVIEW
      // =========================================
      if (page == 0) {
        // Date
        if (time_now.is_valid()) {
          const char* days[] = {"SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"};
          const char* months[] = {"JAN", "FEB", "MAR", "APR", "MAY", "JUN", 
                                  "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"};
          it.printf(120, 52, id(font_small), amber, TextAlign::CENTER, "%s %02d %s", 
                    days[time_now.day_of_week - 1], time_now.day_of_month, months[time_now.month - 1]);
        }
        
        // Quick status row
        it.line(15, 70, 225, 70, dim);
        it.printf(120, 77, id(font_tiny), dim, TextAlign::CENTER, "STATUS");
        
        // Temperature quick view
        it.printf(45, 95, id(font_tiny), cyan, TextAlign::CENTER, "OUT");
        if (id(outside_temperature).has_state()) {
          it.printf(45, 110, id(font_small), cyan, TextAlign::CENTER, "%.0fC", id(outside_temperature).state);
        }
        
        it.printf(95, 95, id(font_tiny), amber, TextAlign::CENTER, "IN");
        if (id(indoor_temperature).has_state()) {
          it.printf(95, 110, id(font_small), amber, TextAlign::CENTER, "%.0fC", id(indoor_temperature).state);
        }
        
        // CO2 indicator
        it.printf(145, 95, id(font_tiny), dim, TextAlign::CENTER, "CO2");
        if (id(co2_level).has_state()) {
          float co2 = id(co2_level).state;
          Color co2_color = co2 < 800 ? green : (co2 < 1200 ? amber : red);
          it.printf(145, 110, id(font_small), co2_color, TextAlign::CENTER, "%.0f", co2);
        }
        
        // Presence indicator
        bool occupied = id(radar_occupancy).has_state() && id(radar_occupancy).state;
        it.printf(195, 95, id(font_tiny), dim, TextAlign::CENTER, "HOME");
        it.filled_circle(195, 115, 6, occupied ? green : dimmer);
        
        // Open windows alert
        bool w1 = id(window_wohnzimmer).has_state() && id(window_wohnzimmer).state;
        bool w2 = id(window_bad).has_state() && id(window_bad).state;
        bool w3 = id(window_work).has_state() && id(window_work).state;
        int open_count = (w1 ? 1 : 0) + (w2 ? 1 : 0) + (w3 ? 1 : 0);
        
        if (open_count > 0) {
          it.filled_rectangle(20, 132, 200, 18, dimmer);
          it.printf(120, 141, id(font_small), red, TextAlign::CENTER, "%d WINDOW%s OPEN", 
                    open_count, open_count > 1 ? "S" : "");
        }
        
        // To-Do List section
        it.line(15, 155, 225, 155, dim);
        it.printf(120, 162, id(font_tiny), dim, TextAlign::CENTER, "TO-DO LIST");
        
        auto draw_todo = [&](int y, const char* title, const char* due, const char* overdue, bool has_data) {
          if (has_data && strlen(title) > 0 && strcmp(title, "No tasks") != 0) {
            it.printf(25, y, id(font_small), cyan, TextAlign::TOP_LEFT, "[ ]");
            
            int text_offset = 55;
            if (strcmp(due, "none") != 0 && strlen(due) > 0) {
               Color date_color = (strcmp(overdue, "True") == 0) ? red : amber;
               it.printf(55, y + 2, id(font_tiny), date_color, TextAlign::TOP_LEFT, "%s", due);
               text_offset = 100;
            }

            if (text_offset > 60)
              it.printf(text_offset, y, id(font_small), white, TextAlign::TOP_LEFT, "%.14s", title);
            else
              it.printf(text_offset, y, id(font_small), white, TextAlign::TOP_LEFT, "%.22s", title);

          } else if (y == 178) {
             it.printf(120, y, id(font_tiny), dimmer, TextAlign::CENTER, "LIST EMPTY");
          }
        };
        
        draw_todo(178, id(todo_1).state.c_str(), id(todo_1_due).state.c_str(), 
                  id(todo_1_overdue).state.c_str(), id(todo_1).has_state());
        draw_todo(200, id(todo_2).state.c_str(), id(todo_2_due).state.c_str(), 
                  id(todo_2_overdue).state.c_str(), id(todo_2).has_state());
        draw_todo(222, id(todo_3).state.c_str(), id(todo_3_due).state.c_str(), 
                  id(todo_3_overdue).state.c_str(), id(todo_3).has_state());
        
        // Active devices section
        it.line(15, 248, 225, 248, dim);
        it.printf(120, 255, id(font_tiny), dim, TextAlign::CENTER, "ACTIVE DEVICES");
        
        int badge_x = 25;
        int badge_y = 272;
        
        // Vacuum badge
        bool cleaning = id(vacuum_cleaning).has_state() && id(vacuum_cleaning).state;
        if (cleaning) {
          it.filled_rectangle(badge_x, badge_y, 60, 18, green);
          it.printf(badge_x + 30, badge_y + 9, id(font_tiny), black, TextAlign::CENTER, "VACUUM");
          badge_x += 65;
        }
        
        // Washing machine badge
        std::string wash_status = id(washing_machine_status).has_state() ? id(washing_machine_status).state : "";
        bool washing_active = wash_status != "All Done!" && wash_status != "" && wash_status != "Next Load Please!";
        if (washing_active) {
          Color wash_color = (wash_status == "Wrinkle Risk Rising!") ? red : magenta;
          it.filled_rectangle(badge_x, badge_y, 60, 18, wash_color);
          it.printf(badge_x + 30, badge_y + 9, id(font_tiny), black, TextAlign::CENTER, "WASHER");
          badge_x += 65;
        }
        
        // Printer badge
        bool printing = id(printer_progress).has_state() && id(printer_progress).state > 0;
        if (printing) {
          it.filled_rectangle(badge_x, badge_y, 60, 18, amber);
          it.printf(badge_x + 30, badge_y + 9, id(font_tiny), black, TextAlign::CENTER, "PRINT");
          badge_x += 65;
        }
        
        // Beamer badge
        bool beamer = id(beamer_on).has_state() && id(beamer_on).state;
        if (beamer) {
          it.filled_rectangle(badge_x, badge_y, 60, 18, blue);
          it.printf(badge_x + 30, badge_y + 9, id(font_tiny), black, TextAlign::CENTER, "BEAMER");
          badge_x += 65;
        }
        
        if (!cleaning && !washing_active && !printing && !beamer) {
          it.printf(120, badge_y + 6, id(font_tiny), dimmer, TextAlign::CENTER, "ALL IDLE");
        }
      }
      
      // =========================================
      // PAGE 1: CLIMATE
      // =========================================
      else if (page == 1) {
        it.printf(120, 48, id(font_tiny), dim, TextAlign::CENTER, "CLIMATE MONITOR");
        
        // CO2 Gauge
        int gx = 120, gy = 120, gr = 65;
        
        for (int i = -45; i <= 225; i += 4) {
          float angle = i * 3.14159 / 180.0;
          it.draw_pixel_at(gx + cos(angle) * gr, gy + sin(angle) * gr, dim);
        }
        
        const char* labels[] = {"400", "800", "1200", "1600", "2000"};
        for (int i = 0; i <= 4; i++) {
          float angle = (225 - i * 67.5) * 3.14159 / 180.0;
          int x1 = gx + cos(angle) * (gr - 6);
          int y1 = gy + sin(angle) * (gr - 6);
          int x2 = gx + cos(angle) * gr;
          int y2 = gy + sin(angle) * gr;
          it.line(x1, y1, x2, y2, white);
          
          int lx = gx + cos(angle) * (gr - 18);
          int ly = gy + sin(angle) * (gr - 18);
          it.printf(lx, ly, id(font_tiny), dim, TextAlign::CENTER, "%s", labels[i]);
        }
        
        float co2_val = 400;
        Color needle_color = green;
        if (id(co2_level).has_state()) {
          co2_val = id(co2_level).state;
          needle_color = co2_val < 800 ? green : (co2_val < 1200 ? amber : red);
        }
        
        float mapped = (co2_val - 400) / 1600.0;
        if (mapped < 0) mapped = 0;
        if (mapped > 1) mapped = 1;
        float needle_angle = (225 - mapped * 270) * 3.14159 / 180.0;
        
        int nx = gx + cos(needle_angle) * (gr - 10);
        int ny = gy + sin(needle_angle) * (gr - 10);
        it.line(gx, gy, nx, ny, needle_color);
        it.filled_circle(gx, gy, 4, white);
        
        it.printf(120, 185, id(font_tiny), dim, TextAlign::CENTER, "CO2 ppm");
        if (id(co2_level).has_state()) {
          it.printf(120, 202, id(font_large), needle_color, TextAlign::TOP_CENTER, "%.0f", id(co2_level).state);
        }
        
        it.line(20, 235, 220, 235, dim);
        
        // Outdoor
        it.printf(70, 242, id(font_tiny), cyan, TextAlign::CENTER, "OUTDOOR");
        if (id(outside_temperature).has_state()) {
          it.printf(70, 260, id(font_medium), cyan, TextAlign::CENTER, "%.1fC", id(outside_temperature).state);
        }
        if (id(outside_humidity).has_state()) {
          it.printf(70, 282, id(font_small), dim, TextAlign::CENTER, "%.0f%% RH", id(outside_humidity).state);
        }
        
        it.line(120, 245, 120, 285, dimmer);
        
        // Indoor
        it.printf(170, 242, id(font_tiny), amber, TextAlign::CENTER, "INDOOR");
        if (id(indoor_temperature).has_state()) {
          it.printf(170, 260, id(font_medium), amber, TextAlign::CENTER, "%.1fC", id(indoor_temperature).state);
        }
        if (id(indoor_humidity).has_state()) {
          it.printf(170, 282, id(font_small), dim, TextAlign::CENTER, "%.0f%% RH", id(indoor_humidity).state);
        }
      }
      
      // =========================================
      // PAGE 2: HOUSE STATUS
      // =========================================
      else if (page == 2) {
        it.printf(120, 48, id(font_tiny), dim, TextAlign::CENTER, "HOUSE STATUS");
        
        // Windows
        it.printf(120, 65, id(font_small), white, TextAlign::CENTER, "WINDOWS");
        it.line(40, 78, 200, 78, dim);
        
        auto draw_window = [&](int x, int y, const char* label, bool is_open) {
          Color c = is_open ? red : green;
          it.rectangle(x-12, y, 24, 28, c);
          it.line(x, y, x, y+28, c);
          it.line(x-12, y+14, x+12, y+14, c);
          it.printf(x, y + 35, id(font_tiny), c, TextAlign::CENTER, "%s", is_open ? "OPEN" : "SHUT");
          it.printf(x, y + 48, id(font_tiny), dim, TextAlign::CENTER, "%s", label);
        };
        
        bool w1 = id(window_wohnzimmer).has_state() && id(window_wohnzimmer).state;
        bool w2 = id(window_bad).has_state() && id(window_bad).state;
        bool w3 = id(window_work).has_state() && id(window_work).state;
        
        draw_window(50, 88, "WOHN", w1);
        draw_window(120, 88, "BAD", w2);
        draw_window(190, 88, "WORK", w3);
        
        // Lights
        it.printf(120, 155, id(font_small), white, TextAlign::CENTER, "LIGHTS");
        it.line(40, 168, 200, 168, dim);
        
        auto draw_bulb = [&](int x, int y, const char* label, bool is_on) {
          Color c = is_on ? amber : dim;
          it.circle(x, y, 10, c);
          if (is_on) {
            it.filled_circle(x, y, 6, amber);
            for (int i = 0; i < 8; i++) {
              float a = i * 3.14159 / 4.0;
              it.line(x + cos(a)*13, y + sin(a)*13, x + cos(a)*17, y + sin(a)*17, amber);
            }
          }
          it.printf(x, y + 22, id(font_tiny), c, TextAlign::CENTER, "%s", label);
        };
        
        bool l1 = id(light_wohnzimmer).has_state() && id(light_wohnzimmer).state;
        bool l2 = id(light_schreibtisch).has_state() && id(light_schreibtisch).state;
        bool l3 = id(light_stehlampe).has_state() && id(light_stehlampe).state;
        
        draw_bulb(50, 190, "WOHN", l1);
        draw_bulb(120, 190, "DESK", l2);
        draw_bulb(190, 190, "LAMP", l3);
        
        // Presence
        it.printf(120, 235, id(font_small), white, TextAlign::CENTER, "PRESENCE");
        it.line(40, 248, 200, 248, dim);
        
        bool motion = id(motion_wohnzimmer).has_state() && id(motion_wohnzimmer).state;
        bool occ = id(radar_occupancy).has_state() && id(radar_occupancy).state;
        
        it.printf(80, 262, id(font_tiny), dim, TextAlign::CENTER, "MOTION");
        it.filled_circle(80, 280, 8, motion ? green : dimmer);
        
        it.printf(160, 262, id(font_tiny), dim, TextAlign::CENTER, "OCCUPIED");
        it.filled_circle(160, 280, 8, occ ? green : dimmer);
      }
      
      // =========================================
      // PAGE 3: DEVICES
      // =========================================
      else if (page == 3) {
        it.printf(120, 48, id(font_tiny), dim, TextAlign::CENTER, "DEVICES");
        
        // Roborock
        it.printf(120, 65, id(font_small), white, TextAlign::CENTER, "ROBOROCK");
        it.line(40, 78, 200, 78, dim);
        
        bool cleaning = id(vacuum_cleaning).has_state() && id(vacuum_cleaning).state;
        Color vac_color = cleaning ? green : cyan;
        it.printf(120, 92, id(font_medium), vac_color, TextAlign::CENTER, "%s", 
                  id(vacuum_status).has_state() ? id(vacuum_status).state.c_str() : "---");
        
        it.printf(30, 118, id(font_tiny), dim, TextAlign::TOP_LEFT, "BAT");
        it.rectangle(50, 115, 130, 14, dim);
        if (id(vacuum_battery).has_state()) {
          float batt = id(vacuum_battery).state;
          Color bc = batt > 50 ? green : (batt > 20 ? amber : red);
          it.filled_rectangle(52, 117, (batt / 100.0) * 126, 10, bc);
          it.printf(190, 116, id(font_tiny), bc, TextAlign::TOP_LEFT, "%.0f%%", batt);
        }
        
        // Washing Machine
        it.printf(120, 145, id(font_small), white, TextAlign::CENTER, "WASHING MACHINE");
        it.line(40, 158, 200, 158, dim);
        
        std::string wash_status = id(washing_machine_status).has_state() ? id(washing_machine_status).state : "---";
        Color wash_color = dim;
        if (wash_status == "Scrubbing Away!") wash_color = cyan;
        else if (wash_status == "Drama in the Drum!") wash_color = magenta;
        else if (wash_status == "All Done!") wash_color = green;
        else if (wash_status == "Wrinkle Risk Rising!") wash_color = red;
        else if (wash_status == "Next Load Please!") wash_color = dim;
        
        it.printf(120, 175, id(font_medium), wash_color, TextAlign::CENTER, "%.18s", wash_status.c_str());
        
        // 3D Printer
        it.printf(120, 210, id(font_small), white, TextAlign::CENTER, "3D PRINTER");
        it.line(40, 223, 200, 223, dim);
        
        if (id(printer_progress).has_state() && id(printer_progress).state > 0) {
          float prog = id(printer_progress).state;
          it.printf(120, 238, id(font_tiny), amber, TextAlign::CENTER, "PRINTING");
          it.rectangle(30, 253, 180, 14, dim);
          it.filled_rectangle(32, 255, (prog / 100.0) * 176, 10, amber);
          it.printf(120, 272, id(font_medium), amber, TextAlign::CENTER, "%.0f%%", prog);
        } else {
          it.printf(120, 255, id(font_medium), dim, TextAlign::CENTER, "IDLE");
        }
      }