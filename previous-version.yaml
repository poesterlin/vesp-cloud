globals:
  - id: current_page
    type: int
    restore_value: no
    initial_value: "0"
  - id: page_count
    type: int
    restore_value: no
    initial_value: "4"
  - id: last_touch_time
    type: unsigned long
    restore_value: no
    initial_value: "0"
  - id: last_touch_state
    type: int
    restore_value: no
    initial_value: "0"
  - id: touch_start_x
    type: int
    restore_value: no
    initial_value: "0"
  - id: touch_current_x
    type: int
    restore_value: no
    initial_value: "0"

interval:
  - interval: 50ms
    then:
      - lambda: |-
          uint8_t start_reg = 0x00;
          uint8_t buf[8];
          
          if (id(touch_i2c)->write(0x1A, &start_reg, 1, true) != i2c::ERROR_OK) return;
          if (id(touch_i2c)->read(0x1A, buf, 8) != i2c::ERROR_OK) return;
          
          int current_state = (buf[0] == 0x06) ? 1 : 0;
          
          // Extract X coordinate for swipe detection
          int raw_x = ((buf[1] & 0x0F) << 8) | buf[2];
          int x = raw_x * 240 / 4096;
          if (x < 0) x = 0;
          if (x > 239) x = 239;
          
          // Touch start
          if (current_state == 1 && id(last_touch_state) == 0) {
            id(touch_start_x) = x;
            id(touch_current_x) = x;
            id(last_touch_time) = millis();
            ESP_LOGI("touch", "TOUCH START at X=%d", x);
          }
          // Update position while touching
          else if (current_state == 1) {
            id(touch_current_x) = x;
            id(last_touch_time) = millis();
          }
          // Touch release - calculate swipe
          else if (current_state == 0 && id(last_touch_state) == 1) {
            int delta = id(touch_current_x) - id(touch_start_x);
            
            // ESP_LOGI("touch", "TOUCH RELEASE: Start=%d, End=%d, Delta=%d", 
            //          id(touch_start_x), id(touch_current_x), delta);
            
            if (delta < -40) {
              // Swipe LEFT (right to left) = next page
              id(current_page) = (id(current_page) + 1) % id(page_count);
              ESP_LOGI("touch", "SWIPE LEFT → Page %d", id(current_page));
            } else if (delta > 40) {
              // Swipe RIGHT (left to right) = previous page
              id(current_page) = (id(current_page) - 1 + id(page_count)) % id(page_count);
              ESP_LOGI("touch", "SWIPE RIGHT → Page %d", id(current_page));
            } else {
              // Tap = next page
              id(current_page) = (id(current_page) + 1) % id(page_count);
              ESP_LOGI("touch", "TAP → Page %d", id(current_page));
            }
          }
          
          id(last_touch_state) = current_state;

  - interval: 1s
    then:
      - lambda: |-
          if (id(current_page) != 0 && (millis() - id(last_touch_time)) > 30000) {
            id(current_page) = 0;
            ESP_LOGI("display", "Auto-return to page 0");
          }

