x-logging: &default-logging
  driver: local
  options:
    max-size: "20m"
    max-file: "5"
    compress: "true"

services:
  esphome:
    restart: unless-stopped
    logging: *default-logging
    build:
      dockerfile: packages/editor/Dockerfile
      args: 
        DOMAIN: ${DOMAIN}
    cpus: "6.0"
    mem_limit: 20g
    mem_reservation: 2g
    pids_limit: 4096
    ulimits:
      nproc: 4096
      nofile:
        soft: 65536
        hard: 65536
    environment:
      - DATABASE_URL=postgresql://postgres:password@homelab:5432/esphome
      - CONCURRENT_JOBS=4
      - COMPILER_MODE=${COMPILER_MODE:-embedded}
      - APP_EDITION=cloud
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - PUBLIC_BASE_URL=https://${DOMAIN}
      - PUBLIC_LEGAL_OPERATOR_NAME=${PUBLIC_LEGAL_OPERATOR_NAME:-}
      - PUBLIC_LEGAL_STREET_ADDRESS=${PUBLIC_LEGAL_STREET_ADDRESS:-}
      - PUBLIC_LEGAL_POSTAL_CODE=${PUBLIC_LEGAL_POSTAL_CODE:-}
      - PUBLIC_LEGAL_LOCALITY=${PUBLIC_LEGAL_LOCALITY:-}
      - PUBLIC_LEGAL_COUNTRY=${PUBLIC_LEGAL_COUNTRY:-}
      - PUBLIC_LEGAL_EMAIL=${PUBLIC_LEGAL_EMAIL:-support@vesp-cloud.com}
      - PUBLIC_LEGAL_SUPERVISORY_AUTHORITY=${PUBLIC_LEGAL_SUPERVISORY_AUTHORITY:-}
      - PUBLIC_LEGAL_DISPUTE_RESOLUTION=${PUBLIC_LEGAL_DISPUTE_RESOLUTION:-}
      - LOG_LEVEL=info
    networks:
      - traefik_web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-web}-esphome.rule=Host(`${DOMAIN}`)"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME:-web}-esphome.loadbalancer.server.port=3000"
    tmpfs:
      - /tmp/esphome-builds:size=12g
    volumes:
      - platformio_data:/data/platformio
      - pio_cache:/data/pio-build-cache
      - ccache_data:/data/ccache

  worker:
    restart: unless-stopped
    logging: *default-logging
    profiles: ["worker"]
    build:
      dockerfile: packages/editor/Dockerfile.worker
    cpus: "6.0"
    mem_limit: 8g
    mem_reservation: 2g
    pids_limit: 4096
    ulimits:
      nproc: 4096
      nofile:
        soft: 65536
        hard: 65536
    environment:
      - DATABASE_URL=postgresql://postgres:password@homelab:5432/esphome
      - CONCURRENT_JOBS=4
      - COMPILER_MODE=external
      - APP_EDITION=cloud
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - PUBLIC_BASE_URL=https://${DOMAIN}
      - LOG_LEVEL=info
    tmpfs:
      - /tmp/esphome-builds:size=12g
    volumes:
      - platformio_data:/data/platformio
      - pio_cache:/data/pio-build-cache
      - ccache_data:/data/ccache

  admin:
    restart: unless-stopped
    logging: *default-logging
    build:
      dockerfile: packages/admin/Dockerfile
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/esphome
      - TSIDP_ISSUER=${TSIDP_ISSUER}
      - TSIDP_CLIENT_ID=${TSIDP_CLIENT_ID}
      - TSIDP_CLIENT_SECRET=${TSIDP_CLIENT_SECRET}
      - URL=https://${ADMIN_DOMAIN}
      - SENTRY_DSN=${SENTRY_DSN:-}
    networks:
      - traefik_web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-web}-esphome-admin.rule=Host(`${ADMIN_DOMAIN}`)"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME:-web}-esphome-admin.loadbalancer.server.port=3000"

  docs:
    restart: unless-stopped
    logging: *default-logging
    build:
      dockerfile: packages/docs/Dockerfile
    networks:
      - traefik_web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-web}-docs.rule=Host(`${DOCS_DOMAIN}`)"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME:-web}-docs.loadbalancer.server.port=80"

volumes:
  platformio_data:
  pio_cache:
  ccache_data:

networks:
  traefik_web:
    external: true
