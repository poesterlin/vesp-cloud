server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # VitePress emits content-hashed build assets, so these can be cached forever.
    location ^~ /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Public files keep stable names and therefore use a shorter long-lived cache.
    location ~* \.(?:avif|gif|ico|jpe?g|png|svg|webp|woff2?)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
        add_header Cache-Control "public, max-age=300, s-maxage=3600" always;
    }

    error_page 404 /404.html;
}
